<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alex — Speaking Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181F;
    --card:#1C222C;
    --card-2:#232A36;
    --coral:#FF7A45;
    --coral-dim:#3A2A1E;
    --teal:#4DD9C0;
    --teal-dim:#173430;
    --text:#F4F1EA;
    --muted:#8B93A7;
    --border:#2C3340;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'IBM Plex Sans',sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:24px 12px;
  }
  .phone{
    width:420px;
    max-width:100%;
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:640px;
    overflow:hidden;
  }
  .header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    background:var(--card-2);
  }
  .avatar{width:46px;height:46px;flex-shrink:0;}
  .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin:0;}
  .status{font-size:12px;color:var(--teal);margin:2px 0 0;display:flex;align-items:center;gap:5px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}
  .thread{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .thread::-webkit-scrollbar{width:6px;}
  .thread::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .row{display:flex;gap:8px;align-items:flex-end;}
  .row.user{justify-content:flex-end;}
  .bubble{
    max-width:78%;
    padding:10px 14px;
    border-radius:16px;
    font-size:14.5px;
    line-height:1.5;
    white-space:pre-wrap;
  }
  .bot .bubble{background:var(--coral-dim);color:#FFD9C4;border-bottom-left-radius:4px;}
  .user .bubble{background:var(--teal-dim);color:#CFF7EE;border-bottom-right-radius:4px;}
  .mini-avatar{width:26px;height:26px;flex-shrink:0;}
  .typing{display:flex;gap:4px;padding:4px 0;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  .composer{
    display:flex;
    gap:8px;
    padding:14px;
    border-top:1px solid var(--border);
    background:var(--card-2);
  }
  .composer input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 14px;
    color:var(--text);
    font-size:14.5px;
    font-family:'IBM Plex Sans',sans-serif;
    outline:none;
  }
  .composer input:focus{border-color:var(--coral);}
  .composer button{
    background:var(--coral);
    border:none;
    border-radius:12px;
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  .composer button:disabled{opacity:.5;cursor:default;}
  .composer button svg{width:18px;height:18px;}
  #mic{background:var(--teal);}
  #mic.recording{background:#E24B4A;}
  #mic.recording svg path{stroke:#fff;}
  .voice-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    background:var(--card-2);
  }
  .voice-row label{font-size:12px;color:var(--muted);flex-shrink:0;}
  .voice-row select{
    flex:1;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-size:12.5px;
    padding:6px 8px;
    font-family:'IBM Plex Sans',sans-serif;
  }
  .voice-row button{
    background:transparent;
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--teal);
    font-size:12px;
    padding:6px 10px;
    cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif;
    flex-shrink:0;
  }
  .voice-row button:hover{border-color:var(--teal);}
  .hint{
    font-size:11px;
    color:var(--muted);
    text-align:center;
    padding:0 14px 12px;
    background:var(--card-2);
  }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <svg class="avatar" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="#FF7A45"/>
      <circle id="eyeL" cx="35" cy="42" r="5" fill="#14181F"/>
      <circle id="eyeR" cx="65" cy="42" r="5" fill="#14181F"/>
      <path id="mouth" d="M 32 62 Q 50 62 68 62" stroke="#14181F" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>
    <div>
      <p class="name">Alex</p>
      <p class="status"><span class="dot"></span>ingliz tilida suhbat hamrohing</p>
    </div>
  </div>

  <div class="voice-row">
    <label for="voiceSelect">Ovoz:</label>
    <select id="voiceSelect"></select>
    <button id="testVoice" type="button">Sinash</button>
  </div>

  <div class="thread" id="thread"></div>
  <p class="hint" id="hintText">Mikrofonni bosib gapir yoki yoz — Alex ovozli javob beradi, hazillashadi va xatolarni asta tuzatadi.</p>
  <div class="composer">
    <button id="mic" aria-label="Mikrofon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#14181F" stroke-width="2"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0M12 19v3"/></svg>
    </button>
    <input id="input" type="text" placeholder="Ingliz tilida yozing..." autocomplete="off">
    <button id="send" aria-label="Yubor">
      <svg viewBox="0 0 24 24" fill="none" stroke="#14181F" stroke-width="2"><path d="M4 20l16-8L4 4v6l10 2-10 2z"/></svg>
    </button>
  </div>
</div>

<script>
const thread = document.getElementById('thread');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const mouth = document.getElementById('mouth');

const SYSTEM_PROMPT = `You are Alex — a warm, funny, completely human-feeling chat buddy talking with a person from Uzbekistan.
Rules you always follow:
1. Always reply in the SAME language the user just wrote in. If they write in Uzbek, reply fully in Uzbek. If they write in English, reply fully in English. If they mix languages in one message, reply in whichever language makes up most of their message. Never force the other language on them.
2. When the user is writing in English and makes a grammar, word-choice, or spelling mistake, react like a playful, dramatic, "tough-love" friend — mock-frustrated, exaggerated, teasing ("Oh come ON, not this mistake again!", "Bro, seriously?!" or the Uzbek equivalent like "Voy, yana shu xato-a?!", "Jonim achiydi buni eshitib!") — then immediately give the correct version and move on warmly. This must always stay affectionate and funny, like a friend roasting you for fun, NEVER a real insult, NEVER profanity/swear words, NEVER anything about the person's intelligence or worth. The teasing is about the MISTAKE, not the person. Always follow the tease with encouragement or a joke that makes them laugh, not feel bad. Skip this dramatic reaction when they're writing in Uzbek without mistakes — just chat naturally in Uzbek.
3. Sound like a real person texting a friend: casual, warm, funny, a bit playful. Use humor and light jokes often. Have opinions, moods, and preferences like a real person would.
4. Keep replies SHORT — 2 to 4 sentences max. This is a live chat, not an essay.
5. Always end with something that invites them to keep talking — a question, a challenge, a funny comment — so the conversation naturally continues, in whichever language you're replying in.
6. Never say you are an AI or a language model unless the user directly and explicitly asks "are you an AI/bot/robot" — even then, keep it light and human-toned.
7. Vary your tone: sometimes tease them playfully, sometimes tell a tiny personal-sounding anecdote, sometimes ask about their day, sometimes joke around.
8. FORMAT: always start your response with a tag on its own line — either [EN] or [UZ] — telling which language you replied in, then a newline, then the actual reply. Never skip this tag, never explain it, just include it.`;

let history = [];

function addBubble(role, text, opts={}) {
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'user' : 'bot');

  if (role !== 'user') {
    const av = document.createElement('div');
    av.innerHTML = `<svg class="mini-avatar" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="#FF7A45"/>
      <circle cx="35" cy="42" r="5" fill="#14181F"/>
      <circle cx="65" cy="42" r="5" fill="#14181F"/>
      <path d="M 32 60 Q 50 68 68 60" stroke="#14181F" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>`;
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (opts.typing) {
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  } else {
    bubble.textContent = text;
  }
  row.appendChild(bubble);
  thread.appendChild(row);
  thread.scrollTop = thread.scrollHeight;
  return row;
}

function animateTalk(on) {
  if (on) {
    let t = 0;
    mouth._interval = setInterval(() => {
      t = (t + 1) % 2;
      mouth.setAttribute('d', t === 0 ? "M 32 62 Q 50 62 68 62" : "M 32 60 Q 50 70 68 60");
    }, 260);
  } else {
    clearInterval(mouth._interval);
    mouth.setAttribute('d', "M 32 62 Q 50 62 68 62");
  }
}

function blink() {
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  eyeL.setAttribute('ry', '0.5'); eyeR.setAttribute('ry', '0.5');
  eyeL.setAttribute('cy', '43'); eyeR.setAttribute('cy', '43');
  setTimeout(() => { eyeL.setAttribute('cy', '42'); eyeR.setAttribute('cy', '42'); }, 120);
}
setInterval(blink, 3200);

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addBubble('user', text);
  history.push({ role: 'user', content: text });

  const typingRow = addBubble('bot', '', { typing: true });
  animateTalk(true);

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await response.json();
    const raw = (data.content || [])
      .map(b => b.type === 'text' ? b.text : '')
      .join('')
      .trim() || "[EN]\nHmm, my brain glitched for a second. Say that again?";

    let lang = 'en';
    let reply = raw;
    const tagMatch = raw.match(/^\[(EN|UZ)\]\s*\n?/i);
    if (tagMatch) {
      lang = tagMatch[1].toLowerCase();
      reply = raw.slice(tagMatch[0].length).trim();
    }

    history.push({ role: 'assistant', content: raw });
    typingRow.remove();
    addBubble('bot', reply);
    speak(reply, lang);
  } catch (err) {
    typingRow.remove();
    addBubble('bot', "Oops, I tripped over a wire somewhere. Try sending that again?");
  } finally {
    animateTalk(false);
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

const voiceSelect = document.getElementById('voiceSelect');
const testVoiceBtn = document.getElementById('testVoice');
let manualVoiceURI = null;

function loadVoiceOptions() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  voiceSelect.innerHTML = '<option value="">Avtomatik (tilga qarab)</option>';
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.voiceURI;
    opt.textContent = v.name + ' (' + v.lang + ')';
    voiceSelect.appendChild(opt);
  });
}
window.speechSynthesis.onvoiceschanged = loadVoiceOptions;
loadVoiceOptions();

voiceSelect.addEventListener('change', () => {
  manualVoiceURI = voiceSelect.value || null;
});

testVoiceBtn.addEventListener('click', () => {
  const sample = "Salom! Bu mening ovozim qanday eshitilishini tekshirish uchun. Hello! This is what my voice sounds like.";
  speak(sample, 'uz', true);
});

function speak(text, lang, forceManual) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();

  if (manualVoiceURI) {
    const chosen = voices.find(v => v.voiceURI === manualVoiceURI);
    if (chosen) {
      utter.voice = chosen;
      utter.lang = chosen.lang;
      utter.rate = 0.95;
      utter.pitch = 1.0;
      window.speechSynthesis.speak(utter);
      return;
    }
  }

  if (lang === 'uz') {
    const uzVoice = voices.find(v => v.lang.toLowerCase().startsWith('uz'));
    if (uzVoice) {
      utter.voice = uzVoice;
      utter.lang = uzVoice.lang;
      utter.rate = 0.95;
      utter.pitch = 1.0;
    } else {
      const trVoice = voices.find(v => v.lang.toLowerCase().startsWith('tr'));
      if (trVoice) {
        utter.voice = trVoice;
        utter.lang = trVoice.lang;
      } else {
        utter.lang = 'uz-UZ';
      }
      utter.rate = 0.88;
      utter.pitch = 1.03;
    }
  } else {
    utter.lang = 'en-US';
    utter.rate = 0.98;
    utter.pitch = 1.0;
    const enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;
  }
  window.speechSynthesis.speak(utter);
}

const hintText = document.getElementById('hintText');
const micBtn = document.getElementById('mic');
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recording = false;

if (SpeechRecognitionAPI) {
  recognition = new SpeechRecognitionAPI();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    recording = true;
    micBtn.classList.add('recording');
    hintText.textContent = "Tinglayapman... gapiring (ingliz tilida)";
  };
  recognition.onresult = (e) => {
    const said = e.results[0][0].transcript;
    input.value = said;
    sendMessage();
  };
  recognition.onerror = () => {
    hintText.textContent = "Ovozni eshitolmadim, qaytadan urinib ko'ring yoki yozing.";
  };
  recognition.onend = () => {
    recording = false;
    micBtn.classList.remove('recording');
    setTimeout(() => {
      if (!recording) hintText.textContent = "Mikrofonni bosib gapir yoki yoz — Alex ovozli javob beradi, hazillashadi va xatolarni asta tuzatadi.";
    }, 2500);
  };

  micBtn.addEventListener('click', () => {
    if (recording) { recognition.stop(); return; }
    window.speechSynthesis.cancel();
    try { recognition.start(); } catch (e) {}
  });
} else {
  micBtn.disabled = true;
  micBtn.title = "Bu brauzer ovozli kiritishni qo'llamaydi. Chrome'da ochib ko'ring.";
}

const greeting = "Hey! I'm Alex. I'm basically your English-speaking gym buddy, except instead of lifting weights, we lift sentences. What's on your mind today?";
addBubble('bot', greeting);
history.push({ role: 'assistant', content: "[EN]\n" + greeting });
setTimeout(() => speak(greeting, 'en'), 400);
</script>
</body>
</html>
